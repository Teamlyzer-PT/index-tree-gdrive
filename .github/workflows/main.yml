name: Atualizar Indice do Google Drive

on:
  schedule:
    # Corre automaticamente todas as noites a meia-noite
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permite-te clicar no botao "Run workflow" para atualizar quando quiseres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Executar Script Python e Gerar Pagina Protegida
        run: python generate.py
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          COMPANY_NAME: "Teamlyzer"
          ALLOWED_DOMAIN: "teamlyzer.com"

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
